<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | LyxNexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<style>
    :root {
        --bg-color: #111827;
        --text-color: #F9FAFB;
        --accent-color: #4A90E2;
        --secondary-color: #8B5CF6;
    }
    
    body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
    }
    
    .gradient-text {
        background: linear-gradient(90deg, #3B82F6, #8B5CF6);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
    }
    
    .glass-morph {
        background: rgba(30, 30, 40, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0, 31, 135, 0.2);
        border: 1px solid rgba(59, 130, 246, 0.3);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .glass-morph:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 40px rgba(0, 31, 135, 0.3);
    }
    
    .btn {
        background: linear-gradient(90deg, #3B82F6, #8B5CF6);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 50px;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }
    
    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }
    
    .btn-danger {
        background: linear-gradient(90deg, #EF4444, #DC2626);
    }
    
    .btn-success {
        background: linear-gradient(90deg, #10B981, #059669);
    }
    
    .logo-container {
        background: linear-gradient(135deg, #3B82F6, #8B5CF6);
        border-radius: 20px;
        padding: 15px;
        display: inline-block;
        margin-bottom: 20px;
    }
    
    .admin-card {
        background: rgba(30, 30, 40, 0.7);
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 20px;
    }
    
    .form-input {
        background: rgba(30, 30, 40, 0.8);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 10px;
        padding: 12px 15px;
        color: white;
        width: 100%;
        margin-bottom: 15px;
    }
    
    .form-input:focus {
        outline: none;
        border-color: #3B82F6;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    
    .modal-content {
        background: var(--bg-color);
        border-radius: 15px;
        padding: 30px;
        width: 90%;
        max-width: 500px;
        border: 1px solid rgba(59, 130, 246, 0.3);
    }
    
    .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    
    .spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top: 4px solid #3B82F6;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    .tab-content {
        display: none;
    }
    
    .tab-content.active {
        display: block;
    }
    
    .tab-button {
        background: transparent;
        border: none;
        padding: 10px 20px;
        color: #9CA3AF;
        border-bottom: 2px solid transparent;
        cursor: pointer;
    }
    
    .tab-button.active {
        color: #3B82F6;
        border-bottom-color: #3B82F6;
    }
    
    .file-info {
        display: flex;
        align-items: center;
        background: rgba(30, 30, 40, 0.8);
        border-radius: 10px;
        padding: 10px 15px;
        margin-bottom: 15px;
        border: 1px solid rgba(59, 130, 246, 0.3);
    }
    
    .file-info i {
        margin-right: 10px;
        color: #3B82F6;
    }
    
    .file-actions {
        display: flex;
        gap: 10px;
        margin-top: 10px;
    }
    
    .file-input-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
        width: 100%;
    }
    
    .file-input-wrapper input[type=file] {
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
    }
    
    .file-input-label {
        display: block;
        padding: 12px 15px;
        background: rgba(30, 30, 40, 0.8);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 10px;
        color: #9CA3AF;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .file-input-label:hover {
        background: rgba(30, 30, 40, 0.9);
        border-color: #3B82F6;
        color: #3B82F6;
    }

    /* Responsive Styles */
    @media (max-width: 768px) {
        .btn {
            padding: 10px 20px;
            font-size: 14px;
        }
        
        .modal-content {
            margin: 20px;
            padding: 20px;
            width: calc(100% - 40px);
        }
        
        .file-actions {
            flex-direction: column;
            gap: 5px;
        }
        
        .file-actions .btn {
            width: 100%;
            justify-content: center;
        }
        
        .admin-card {
            padding: 15px;
        }
        
        .text-3xl {
            font-size: 1.5rem;
        }
        
        .text-2xl {
            font-size: 1.25rem;
        }
    }

    @media (max-width: 640px) {
        .flex.justify-between.items-center {
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
        }
        
        .flex.justify-between.items-center .btn {
            width: 100%;
        }
        
        .grid.grid-cols-2 {
            grid-template-columns: 1fr;
            gap: 10px;
        }
        
        .flex.space-x-2 {
            flex-wrap: wrap;
        }
        
        .flex.space-x-2 .btn {
            margin-bottom: 5px;
        }
    }

    /* Hide scrollbar for tabs */
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }

    /* Make action buttons stack on mobile */
    @media (max-width: 480px) {
        .flex.space-x-2.ml-4 {
            margin-left: 0;
            margin-top: 10px;
            width: 100%;
            justify-content: space-between;
        }
        
        .flex.space-x-2.ml-4 .btn {
            flex: 1;
            margin: 0 2px;
        }
    }
</style>
<body>
    <!-- Navigation -->
    <nav class="glass-morph sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex flex-col sm:flex-row justify-between items-center space-y-4 sm:space-y-0">
                <div class="flex items-center space-x-2">
                    <div class="logo-container">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                            <polyline points="7.5 4.21 12 6.81 16.5 4.21"></polyline>
                            <polyline points="7.5 19.79 7.5 14.6 3 12"></polyline>
                            <polyline points="21 12 16.5 14.6 16.5 19.79"></polyline>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                    </div>
                    <span class="text-xl sm:text-2xl font-bold gradient-text">LyxNexus Admin</span>
                </div>
                <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-4 w-full sm:w-auto">
                    <button class="btn bg-gray-600 hover:bg-gray-700 text-sm sm:text-base" onclick="window.location.href='/'">Back to Site</button>
                    <button class="btn btn-danger text-sm sm:text-base" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-2xl sm:text-3xl font-bold gradient-text mb-2">Admin Dashboard</h1>
            <p class="text-gray-400">Manage announcements, assignments, topics, and timetable</p>
        </div>

        <!-- Tabs -->
        <div class="glass-morph rounded-t-xl p-4">
            <div class="flex overflow-x-auto space-x-4 border-b border-gray-700 pb-2 scrollbar-hide">
                <button class="tab-button whitespace-nowrap active" onclick="openTab('announcements-tab')">Announcements</button>
                <button class="tab-button whitespace-nowrap" onclick="openTab('assignments-tab')">Assignments</button>
                <button class="tab-button whitespace-nowrap" onclick="openTab('topics-tab')">Topics</button>
                <button class="tab-button whitespace-nowrap" onclick="openTab('timetable-tab')">Timetable</button>
            </div>
        </div>

        <!-- Announcements Tab -->
        <div id="announcements-tab" class="tab-content active">
            <div class="glass-morph rounded-b-xl p-4 sm:p-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 sm:gap-0">
                    <h2 class="text-xl sm:text-2xl font-bold">Manage Announcements</h2>
                    <button class="btn btn-success w-full sm:w-auto text-sm sm:text-base" onclick="openModal('announcement-modal')">
                        <i class="fas fa-plus mr-2"></i> New Announcement
                    </button>
                </div>
                <div id="announcements-list" class="space-y-4">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Assignments Tab -->
        <div id="assignments-tab" class="tab-content">
            <div class="glass-morph rounded-b-xl p-4 sm:p-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 sm:gap-0">
                    <h2 class="text-xl sm:text-2xl font-bold">Manage Assignments</h2>
                    <button class="btn btn-success w-full sm:w-auto text-sm sm:text-base" onclick="openModal('assignment-modal')">
                        <i class="fas fa-plus mr-2"></i> New Assignment
                    </button>
                </div>
                <div id="assignments-list" class="space-y-4">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Topics Tab -->
        <div id="topics-tab" class="tab-content">
            <div class="glass-morph rounded-b-xl p-4 sm:p-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 sm:gap-0">
                    <h2 class="text-xl sm:text-2xl font-bold">Manage Topics</h2>
                    <button class="btn btn-success w-full sm:w-auto text-sm sm:text-base" onclick="openModal('topic-modal')">
                        <i class="fas fa-plus mr-2"></i> New Topic
                    </button>
                </div>
                <div id="topics-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Timetable Tab -->
        <div id="timetable-tab" class="tab-content">
            <div class="glass-morph rounded-b-xl p-4 sm:p-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 sm:gap-0">
                    <h2 class="text-xl sm:text-2xl font-bold">Manage Timetable</h2>
                    <button class="btn btn-success w-full sm:w-auto text-sm sm:text-base" onclick="openModal('timetable-modal')">
                        <i class="fas fa-plus mr-2"></i> New Timetable Slot
                    </button>
                </div>
                <div id="timetable-list" class="space-y-6">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Announcement Modal -->
    <div id="announcement-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-4">Create Announcement</h3>
            <form id="announcement-form">
                <input type="hidden" id="announcement-id">
                <input type="text" id="announcement-title" class="form-input" placeholder="Title" required>
                <textarea id="announcement-content" class="form-input" rows="5" placeholder="Content" required></textarea>
                <div class="flex flex-col-reverse sm:flex-row justify-end space-y-4 sm:space-y-0 space-y-reverse sm:space-x-3 mt-4">
                    <button type="button" class="btn bg-gray-600 hover:bg-gray-700 w-full sm:w-auto" onclick="closeModal('announcement-modal')">Cancel</button>
                    <button type="submit" class="btn btn-success w-full sm:w-auto mb-4 sm:mb-0">Save Announcement</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Assignment Modal -->
    <div id="assignment-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-4">Create Assignment</h3>
            <form id="assignment-form">
                <input type="hidden" id="assignment-id">
                <input type="text" id="assignment-title" class="form-input" placeholder="Title" required>
                <textarea id="assignment-description" class="form-input" rows="3" placeholder="Description" required></textarea>
                <input type="datetime-local" id="assignment-due-date" class="form-input" required>
                <select id="assignment-topic" class="form-input">
                    <option value="">Select Topic (Optional)</option>
                </select>
                
                <!-- File Upload Section -->
                <div id="assignment-file-section">
                    <div class="file-input-wrapper">
                        <input type="file" id="assignment-file" accept=".pdf,.doc,.docx,.txt,.zip">
                        <label for="assignment-file" class="file-input-label">
                            <i class="fas fa-upload mr-2"></i>Choose Assignment File (Optional)
                        </label>
                    </div>
                    <div id="assignment-file-info" class="file-info" style="display: none;">
                        <i class="fas fa-file"></i>
                        <div class="flex-1">
                            <div id="assignment-file-name" class="font-medium"></div>
                            <div id="assignment-file-size" class="text-sm text-gray-400"></div>
                        </div>
                        <button type="button" class="btn btn-danger text-sm" onclick="clearAssignmentFile()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                
                <div class="flex flex-col-reverse sm:flex-row justify-end space-y-4 sm:space-y-0 space-y-reverse sm:space-x-3 mt-4">
                    <button type="button" class="btn bg-gray-600 hover:bg-gray-700 w-full sm:w-auto" onclick="closeModal('assignment-modal')">Cancel</button>
                    <button type="submit" class="btn btn-success w-full sm:w-auto mb-4 sm:mb-0">Save Assignment</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Topic Modal -->
    <div id="topic-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-4">Create Topic</h3>
            <form id="topic-form">
                <input type="hidden" id="topic-id">
                <input type="text" id="topic-name" class="form-input" placeholder="Topic Name" required>
                <textarea id="topic-description" class="form-input" rows="3" placeholder="Description" required></textarea>
                <div class="flex flex-col-reverse sm:flex-row justify-end space-y-4 sm:space-y-0 space-y-reverse sm:space-x-3 mt-4">
                    <button type="button" class="btn bg-gray-600 hover:bg-gray-700 w-full sm:w-auto" onclick="closeModal('topic-modal')">Cancel</button>
                    <button type="submit" class="btn btn-success w-full sm:w-auto mb-4 sm:mb-0">Save Topic</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Timetable Modal -->
    <div id="timetable-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-4">Create Timetable Slot</h3>
            <form id="timetable-form">
                <input type="hidden" id="timetable-id">
                <select id="timetable-day" class="form-input" required>
                    <option value="">Select Day</option>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                </select>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <input type="time" id="timetable-start" class="form-input" required>
                    <input type="time" id="timetable-end" class="form-input" required>
                </div>
                <input type="text" id="timetable-subject" class="form-input" placeholder="Subject" required>
                <input type="text" id="timetable-room" class="form-input" placeholder="Room">
                <input type="text" id="timetable-teacher" class="form-input" placeholder="Teacher">
                <select id="timetable-topic" class="form-input">
                    <option value="">Select Topic (Optional)</option>
                </select>
                <div class="flex flex-col-reverse sm:flex-row justify-end space-y-4 sm:space-y-0 space-y-reverse sm:space-x-3 mt-4">
                    <button type="button" class="btn bg-gray-600 hover:bg-gray-700 w-full sm:w-auto" onclick="closeModal('timetable-modal')">Cancel</button>
                    <button type="submit" class="btn btn-success w-full sm:w-auto mb-4 sm:mb-0">Save Slot</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // API endpoints
        const API_BASE = '/api';
        const ENDPOINTS = {
            ANNOUNCEMENTS: `${API_BASE}/announcements`,
            ASSIGNMENTS: `${API_BASE}/assignments`,
            TIMETABLE: `${API_BASE}/timetable`,
            TOPICS: `${API_BASE}/topics`
        };

        let currentEditingId = null;
        let currentAssignmentFile = null;

        // Tab management
        function openTab(tabName) {
            // Hide all tab content
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active class from all tab buttons
            document.querySelectorAll('.tab-button').forEach(button => {
                button.classList.remove('active');
            });
            
            // Show the specific tab content
            document.getElementById(tabName).classList.add('active');
            
            // Add active class to the clicked button
            event.target.classList.add('active');
        }

        // Modal management
        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'flex';
            currentEditingId = null;
            currentAssignmentFile = null;
            
            // Clear form if creating new
            if (modalId.includes('modal')) {
                document.getElementById(modalId.replace('modal', 'form')).reset();
                // Clear file info if assignment modal
                if (modalId === 'assignment-modal') {
                    clearAssignmentFile();
                }
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            currentEditingId = null;
            currentAssignmentFile = null;
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
                currentEditingId = null;
                currentAssignmentFile = null;
            }
        }

        // Format date for display
        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString(undefined, options);
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Fetch data from API
        async function fetchData(endpoint) {
            try {
                const response = await fetch(endpoint);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error(`Error fetching data from ${endpoint}:`, error);
                return [];
            }
        }

        // Send data to API
        async function sendData(endpoint, data, method = 'POST') {
            try {
                const response = await fetch(endpoint, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error(`Error sending data to ${endpoint}:`, error);
                throw error;
            }
        }

        // Delete data from API
        async function deleteData(endpoint) {
            try {
                const response = await fetch(endpoint, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error(`Error deleting data from ${endpoint}:`, error);
                throw error;
            }
        }

        // Upload file to API
        async function uploadFile(endpoint, file, assignmentId) {
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${endpoint}/${assignmentId}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error(`Error uploading file to ${endpoint}:`, error);
                throw error;
            }
        }

        // File handling for assignments
        function handleAssignmentFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                currentAssignmentFile = file;
                document.getElementById('assignment-file-name').textContent = file.name;
                document.getElementById('assignment-file-size').textContent = formatFileSize(file.size);
                document.getElementById('assignment-file-info').style.display = 'flex';
            }
        }

        function clearAssignmentFile() {
            currentAssignmentFile = null;
            document.getElementById('assignment-file').value = '';
            document.getElementById('assignment-file-info').style.display = 'none';
        }

        // Load and display announcements
        async function loadAnnouncements() {
            const container = document.getElementById('announcements-list');
            const announcements = await fetchData(ENDPOINTS.ANNOUNCEMENTS);
            
            if (announcements.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400">No announcements available.</p>';
                return;
            }
            
            container.innerHTML = announcements.map(announcement => `
                <div class="admin-card">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-start">
                        <div class="flex-1">
                            <h3 class="text-lg font-bold">${announcement.title}</h3>
                            <p class="text-gray-400 mt-1">${announcement.content}</p>
                            <div class="flex items-center mt-2 text-sm text-gray-500">
                                <span>By: ${announcement.author?.username || 'Unknown'}</span>
                                <span class="mx-2">•</span>
                                <span>${formatDate(announcement.created_at)}</span>
                            </div>
                        </div>
                        <div class="flex flex-col xs:flex-row space-y-2 xs:space-y-0 xs:space-x-2 ml-0 xs:ml-4 w-full xs:w-auto mt-4 sm:mt-0">
                            <button class="btn bg-yellow-600 hover:bg-yellow-700 text-sm w-full xs:w-auto" onclick="editAnnouncement(${announcement.id})">
                                <i class="fas fa-edit"></i>
                                <span class="xs:hidden ml-2">Edit</span>
                            </button>
                            <button class="btn btn-danger text-sm w-full xs:w-auto" onclick="deleteAnnouncement(${announcement.id})">
                                <i class="fas fa-trash"></i>
                                <span class="xs:hidden ml-2">Delete</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Load and display assignments
        async function loadAssignments() {
            const container = document.getElementById('assignments-list');
            const assignments = await fetchData(ENDPOINTS.ASSIGNMENTS);
            
            if (assignments.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400">No assignments available.</p>';
                return;
            }
            
            container.innerHTML = assignments.map(assignment => {
                const dueDate = new Date(assignment.due_date);
                const now = new Date();
                const daysUntilDue = Math.ceil((dueDate - now) / (1000 * 60 * 60 * 24));
                
                let statusClass = 'bg-blue-500';
                if (daysUntilDue < 0) {
                    statusClass = 'bg-red-500';
                } else if (daysUntilDue <= 3) {
                    statusClass = 'bg-yellow-500';
                }
                
                let fileSection = '';
                if (assignment.file_name) {
                    fileSection = `
                        <div class="file-info mt-2">
                            <i class="fas fa-file"></i>
                            <div class="flex-1">
                                <div class="font-medium">${assignment.file_name}</div>
                                <div class="text-sm text-gray-400">${assignment.file_type || 'Unknown type'}</div>
                            </div>
                            <div class="file-actions">
                                <button class="btn bg-blue-600 hover:bg-blue-700 text-sm" onclick="downloadAssignmentFile(${assignment.id})">
                                    <i class="fas fa-download"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }
                
                return `
                <div class="admin-card">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-start">
                        <div class="flex-1">
                            <div class="flex flex-col sm:flex-row sm:items-center">
                                <h3 class="text-lg font-bold">${assignment.title}</h3>
                                <span class="${statusClass} text-white px-2 py-1 rounded-full text-xs mt-2 sm:mt-0 sm:ml-2">Due: ${formatDate(assignment.due_date)}</span>
                            </div>
                            <p class="text-gray-400 mt-1">${assignment.description}</p>
                            ${fileSection}
                            <div class="flex items-center mt-2 text-sm text-gray-500">
                                <span>Topic: ${assignment.topic?.name || 'General'}</span>
                                <span class="mx-2">•</span>
                                <span>By: ${assignment.creator?.username || 'Unknown'}</span>
                            </div>
                        </div>
                        <div class="flex flex-col xs:flex-row space-y-2 xs:space-y-0 xs:space-x-2 ml-0 xs:ml-4 w-full xs:w-auto mt-4 sm:mt-0">
                            <button class="btn bg-yellow-600 hover:bg-yellow-700 text-sm w-full xs:w-auto" onclick="editAssignment(${assignment.id})">
                                <i class="fas fa-edit"></i>
                                <span class="xs:hidden ml-2">Edit</span>
                            </button>
                            <button class="btn btn-danger text-sm w-full xs:w-auto" onclick="deleteAssignment(${assignment.id})">
                                <i class="fas fa-trash"></i>
                                <span class="xs:hidden ml-2">Delete</span>
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Load and display topics
        async function loadTopics() {
            const container = document.getElementById('topics-list');
            const topics = await fetchData(ENDPOINTS.TOPICS);
            
            if (topics.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400">No topics available.</p>';
                return;
            }
            
            container.innerHTML = topics.map(topic => `
                <div class="admin-card">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-start">
                        <div class="flex-1">
                            <h3 class="text-lg font-bold">${topic.name}</h3>
                            <p class="text-gray-400 mt-1">${topic.description}</p>
                            <div class="text-sm text-gray-500 mt-2">
                                Created: ${formatDate(topic.created_at)}
                            </div>
                        </div>
                        <div class="flex flex-col xs:flex-row space-y-2 xs:space-y-0 xs:space-x-2 ml-0 xs:ml-4 w-full xs:w-auto mt-4 sm:mt-0">
                            <button class="btn bg-yellow-600 hover:bg-yellow-700 text-sm w-full xs:w-auto" onclick="editTopic(${topic.id})">
                                <i class="fas fa-edit"></i>
                                <span class="xs:hidden ml-2">Edit</span>
                            </button>
                            <button class="btn btn-danger text-sm w-full xs:w-auto" onclick="deleteTopic(${topic.id})">
                                <i class="fas fa-trash"></i>
                                <span class="xs:hidden ml-2">Delete</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Load and display timetable
        async function loadTimetable() {
            const container = document.getElementById('timetable-list');
            const timetable = await fetchData(ENDPOINTS.TIMETABLE);
            
            if (timetable.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400">No timetable available.</p>';
                return;
            }
            
            container.innerHTML = timetable.map(daySchedule => `
                <div class="admin-card">
                    <h3 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2">${daySchedule.day}</h3>
                    ${daySchedule.slots.map(slot => `
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center py-3 border-b border-gray-800 last:border-b-0">
                            <div class="flex-1 mb-2 sm:mb-0">
                                <div class="font-semibold">${slot.subject}</div>
                                <div class="text-sm text-gray-400">${slot.teacher || 'TBA'} • ${slot.room || 'TBA'}</div>
                            </div>
                            <div class="text-left sm:text-right mr-0 sm:mr-4 mb-2 sm:mb-0">
                                <div class="text-blue-400">${slot.time}</div>
                            </div>
                            <div class="flex flex-col xs:flex-row space-y-2 xs:space-y-0 xs:space-x-2 w-full sm:w-auto">
                                <button class="btn bg-yellow-600 hover:bg-yellow-700 text-sm w-full xs:w-auto" onclick="editTimetableSlot(${slot.id})">
                                    <i class="fas fa-edit"></i>
                                    <span class="xs:hidden ml-2">Edit</span>
                                </button>
                                <button class="btn btn-danger text-sm w-full xs:w-auto" onclick="deleteTimetableSlot(${slot.id})">
                                    <i class="fas fa-trash"></i>
                                    <span class="xs:hidden ml-2">Delete</span>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        // Load topics for dropdowns
        async function loadTopicDropdowns() {
            const topics = await fetchData(ENDPOINTS.TOPICS);
            const topicSelects = document.querySelectorAll('select[id$="topic"]');
            
            topicSelects.forEach(select => {
                // Clear existing options except the first one
                while (select.children.length > 1) {
                    select.removeChild(select.lastChild);
                }
                
                // Add topic options
                topics.forEach(topic => {
                    const option = document.createElement('option');
                    option.value = topic.id;
                    option.textContent = topic.name;
                    select.appendChild(option);
                });
            });
        }

        // Form handlers
        document.getElementById('announcement-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                title: document.getElementById('announcement-title').value,
                content: document.getElementById('announcement-content').value
            };
            
            try {
                if (currentEditingId) {
                    await sendData(`${ENDPOINTS.ANNOUNCEMENTS}/${currentEditingId}`, formData, 'PUT');
                } else {
                    await sendData(ENDPOINTS.ANNOUNCEMENTS, formData);
                }
                
                closeModal('announcement-modal');
                loadAnnouncements();
            } catch (error) {
                alert('Error saving announcement');
            }
        });

        document.getElementById('assignment-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                title: document.getElementById('assignment-title').value,
                description: document.getElementById('assignment-description').value,
                due_date: document.getElementById('assignment-due-date').value,
                topic_id: document.getElementById('assignment-topic').value || null
            };
            
            try {
                let assignmentId;
                if (currentEditingId) {
                    await sendData(`${ENDPOINTS.ASSIGNMENTS}/${currentEditingId}`, formData, 'PUT');
                    assignmentId = currentEditingId;
                } else {
                    const response = await sendData(ENDPOINTS.ASSIGNMENTS, formData);
                    assignmentId = response.id;
                }
                
                // Upload file if selected
                if (currentAssignmentFile) {
                    await uploadFile(ENDPOINTS.ASSIGNMENTS, currentAssignmentFile, assignmentId);
                }
                
                closeModal('assignment-modal');
                loadAssignments();
            } catch (error) {
                alert('Error saving assignment');
            }
        });

        document.getElementById('topic-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('topic-name').value,
                description: document.getElementById('topic-description').value
            };
            
            try {
                if (currentEditingId) {
                    await sendData(`${ENDPOINTS.TOPICS}/${currentEditingId}`, formData, 'PUT');
                } else {
                    await sendData(ENDPOINTS.TOPICS, formData);
                }
                
                closeModal('topic-modal');
                loadTopics();
                loadTopicDropdowns(); // Refresh dropdowns
            } catch (error) {
                alert('Error saving topic');
            }
        });

        document.getElementById('timetable-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                day_of_week: document.getElementById('timetable-day').value,
                start_time: document.getElementById('timetable-start').value,
                end_time: document.getElementById('timetable-end').value,
                subject: document.getElementById('timetable-subject').value,
                room: document.getElementById('timetable-room').value,
                teacher: document.getElementById('timetable-teacher').value,
                topic_id: document.getElementById('timetable-topic').value || null
            };
            
            try {
                if (currentEditingId) {
                    await sendData(`${ENDPOINTS.TIMETABLE}/${currentEditingId}`, formData, 'PUT');
                } else {
                    await sendData(ENDPOINTS.TIMETABLE, formData);
                }
                
                closeModal('timetable-modal');
                loadTimetable();
            } catch (error) {
                alert('Error saving timetable slot');
            }
        });

        // Edit functions
        async function editAnnouncement(id) {
            const announcements = await fetchData(ENDPOINTS.ANNOUNCEMENTS);
            const announcement = announcements.find(a => a.id === id);
            
            if (announcement) {
                document.getElementById('announcement-id').value = announcement.id;
                document.getElementById('announcement-title').value = announcement.title;
                document.getElementById('announcement-content').value = announcement.content;
                currentEditingId = id;
                openModal('announcement-modal');
            }
        }

        async function editAssignment(id) {
            const assignments = await fetchData(ENDPOINTS.ASSIGNMENTS);
            const assignment = assignments.find(a => a.id === id);
            
            if (assignment) {
                document.getElementById('assignment-id').value = assignment.id;
                document.getElementById('assignment-title').value = assignment.title;
                document.getElementById('assignment-description').value = assignment.description;
                document.getElementById('assignment-due-date').value = assignment.due_date.slice(0, 16);
                document.getElementById('assignment-topic').value = assignment.topic?.id || '';
                
                // Show file info if exists
                if (assignment.file_name) {
                    document.getElementById('assignment-file-name').textContent = assignment.file_name;
                    document.getElementById('assignment-file-size').textContent = assignment.file_type || 'Unknown type';
                    document.getElementById('assignment-file-info').style.display = 'flex';
                }
                
                currentEditingId = id;
                openModal('assignment-modal');
            }
        }

        async function editTopic(id) {
            const topics = await fetchData(ENDPOINTS.TOPICS);
            const topic = topics.find(t => t.id === id);
            
            if (topic) {
                document.getElementById('topic-id').value = topic.id;
                document.getElementById('topic-name').value = topic.name;
                document.getElementById('topic-description').value = topic.description;
                currentEditingId = id;
                openModal('topic-modal');
            }
        }

        async function editTimetableSlot(id) {
            // For timetable, we need to fetch all slots and find the specific one
            const timetable = await fetchData(ENDPOINTS.TIMETABLE);
            let targetSlot = null;
            
            // Search through all days and slots
            for (const day of timetable) {
                const slot = day.slots.find(s => s.id === id);
                if (slot) {
                    targetSlot = slot;
                    break;
                }
            }
            
            if (targetSlot) {
                document.getElementById('timetable-id').value = targetSlot.id;
                document.getElementById('timetable-day').value = targetSlot.day;
                document.getElementById('timetable-start').value = targetSlot.start_time;
                document.getElementById('timetable-end').value = targetSlot.end_time;
                document.getElementById('timetable-subject').value = targetSlot.subject;
                document.getElementById('timetable-room').value = targetSlot.room || '';
                document.getElementById('timetable-teacher').value = targetSlot.teacher || '';
                document.getElementById('timetable-topic').value = targetSlot.topic?.id || '';
                currentEditingId = id;
                openModal('timetable-modal');
            }
        }

        // Delete functions
        async function deleteAnnouncement(id) {
            if (confirm('Are you sure you want to delete this announcement?')) {
                try {
                    await deleteData(`${ENDPOINTS.ANNOUNCEMENTS}/${id}`);
                    loadAnnouncements();
                } catch (error) {
                    alert('Error deleting announcement');
                }
            }
        }

        async function deleteAssignment(id) {
            if (confirm('Are you sure you want to delete this assignment?')) {
                try {
                    await deleteData(`${ENDPOINTS.ASSIGNMENTS}/${id}`);
                    loadAssignments();
                } catch (error) {
                    alert('Error deleting assignment');
                }
            }
        }

        async function deleteTopic(id) {
            if (confirm('Are you sure you want to delete this topic?')) {
                try {
                    await deleteData(`${ENDPOINTS.TOPICS}/${id}`);
                    loadTopics();
                    loadTopicDropdowns(); // Refresh dropdowns
                } catch (error) {
                    alert('Error deleting topic');
                }
            }
        }

        async function deleteTimetableSlot(id) {
            if (confirm('Are you sure you want to delete this timetable slot?')) {
                try {
                    await deleteData(`${ENDPOINTS.TIMETABLE}/${id}`);
                    loadTimetable();
                } catch (error) {
                    alert('Error deleting timetable slot');
                }
            }
        }

        // Download assignment file
        function downloadAssignmentFile(id) {
            window.open(`${ENDPOINTS.ASSIGNMENTS}/${id}/download`, '_blank');
        }

        // Logout function
        function logout() {
            // Implement logout logic here
            window.location.href = '/logout';
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            loadAnnouncements();
            loadAssignments();
            loadTopics();
            loadTimetable();
            loadTopicDropdowns();
            
            // Add event listener for file input
            document.getElementById('assignment-file').addEventListener('change', handleAssignmentFileSelect);
        });
        'serviceWorker'in navigator&&navigator.serviceWorker.register('/service-worker.js').then(r=>console.log("SW registered:",r)).catch(e=>console.error("SW failed:",e)),window.addEventListener("online",()=>location.reload()),window.addEventListener("offline",()=>location.href="/offline.html");
    </script>
</body>
</html>
