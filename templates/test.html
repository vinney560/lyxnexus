<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <style>
        :root {
            --bg-color: #14566d;
            --accent-color: rgb(45, 45, 237);
            --sec-bg: linear-gradient(135deg, #498ee9, #4ed8e8, #67ca67);
        }
        body {
            background: var(--bg-color);
            align-items: center;
            display: flex;
            justify-content: center;
            text-align: center;
            font-size: 70px;
            font-family: cursive;
        }
        .container {
            background: var(--sec-bg);
            text-align: center;
            align-items: center;
            justify-content: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            color: aliceblue;
            width: 90vw;
            height: 80vh;
            border: 1px solid blue;
            border-radius: 24px;
        }
        .inner-container {
            width: auto;
            height: 70px;
            align-items: center;
            justify-content: center;
            display: flex;
            word-wrap: break-word;
            overflow: hidden;
            border-right: 7px solid #67ca67;
            border-left: 2px solid #76ed1b;
            border-top: 2px solid #67ca67;
            border-bottom: 2px solid #67ca67;
            border-radius: 14px;
            padding: 10px;
            font-size: 1.3rem;
            background: #dadada;
            color: #000000;
            font-weight: 600px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="inner-container">
            <p id="p"></p>
        </div>
    </div>
    <script>
        new Typed('#p', {
            strings: ['Hello Richard! Vincent here!', 'In HTML, learn on the basic elements like p, h, small, strong, ul, ol, del, div, nav, section, header & footer etc.', 'It\'s all about understanding the elements.', 'Happy coding'],
            typeSpeed: 80,
            backSpeed: 60,
            backDelay: 40,
            loop: true
        });
    </script>
</body>
</html>
